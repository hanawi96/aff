<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Connection</title>
</head>
<body>
    <h1>Test API Connection</h1>
    <div id="result"></div>
    
    <script>
        const CONFIG = {
            API_URL: (() => {
                // Nếu đang chạy local (port 5500 hoặc localhost)
                if (window.location.port === '5500' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    return 'http://localhost:8787';
                }
                // Production
                return 'https://ctv-api.yendev96.workers.dev';
            })()
        };

        async function testAPI() {
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `
                <p><strong>Current URL:</strong> ${window.location.href}</p>
                <p><strong>Hostname:</strong> ${window.location.hostname}</p>
                <p><strong>Port:</strong> ${window.location.port}</p>
                <p><strong>API URL:</strong> ${CONFIG.API_URL}</p>
                <p>Testing connection...</p>
            `;

            try {
                const response = await fetch(`${CONFIG.API_URL}?action=verifySession`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                resultDiv.innerHTML += `
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Response:</strong> ${JSON.stringify(data, null, 2)}</p>
                    <p style="color: green;">✅ API connection successful!</p>
                `;
            } catch (error) {
                resultDiv.innerHTML += `
                    <p style="color: red;">❌ API connection failed: ${error.message}</p>
                `;
            }
        }

        // Test khi trang load
        window.onload = testAPI;
    </script>
</body>
</html>
