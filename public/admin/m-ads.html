<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Quảng cáo — Mobile</title>
<link rel="icon" type="image/svg+xml" href="../shop/favicon.svg">
<link rel="preconnect" href="https://ctv-api.yendev96.workers.dev" crossorigin>
<link rel="stylesheet" href="../assets/css/admin-tailwind-built.css?v=2">
<style>
html{background:#f1f5f9}
*{ -webkit-tap-highlight-color:transparent }
body{ overscroll-behavior-y:contain }
.safe-top{padding-top:max(0.5rem,env(safe-area-inset-top,0px))}
.safe-bottom{padding-bottom:max(1.25rem,env(safe-area-inset-bottom,0px))}
.ptab{transition:all .15s ease}
.ptab.active{background:#6366f1;color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,.35)}
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:sk 1.2s infinite}
@keyframes sk{to{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .22s ease-out}
.mads-hero{border-radius:1.25rem;padding:1.125rem 1.25rem;border:1px solid rgba(226,232,240,.9);box-shadow:0 4px 24px rgba(15,23,42,.06)}
.mads-hero--profit{background:linear-gradient(145deg,#ecfdf5 0%,#fff 45%,#f0fdf4 100%);border-color:rgba(167,243,208,.75)}
.mads-hero--loss{background:linear-gradient(145deg,#fef2f2 0%,#fff 45%,#fff1f2 100%);border-color:rgba(254,202,202,.75)}
.mads-hero--flat{background:linear-gradient(145deg,#f8fafc 0%,#fff 100%);border-color:#e2e8f0}
.mads-hero-val{font-size:clamp(1.625rem,7vw,2rem);font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1.1}
.mads-kpi{border-radius:1rem;border:1px solid rgba(226,232,240,.85);background:#fff;padding:.875rem 1rem;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.mads-kpi-val{font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.mads-roas-good{color:#059669}
.mads-roas-warn{color:#d97706}
.mads-roas-bad{color:#dc2626}
.mads-day-card{border-radius:1rem;border:1px solid #e2e8f0;background:#fff;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.mads-trend-bar{border-radius:4px 4px 0 0;min-width:5px;transition:height .3s ease}
.mads-trend-profit{background:linear-gradient(180deg,#34d399,#10b981)}
.mads-trend-loss{background:linear-gradient(180deg,#f87171,#ef4444)}
.sheet-backdrop{animation:fadeIn .2s ease}
.sheet-panel{animation:sheetUp .28s cubic-bezier(.32,.72,0,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
</style>
</head>
<body class="bg-slate-100 min-h-screen max-w-lg mx-auto text-slate-900">

<!-- Header -->
<header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200/80 safe-top">
  <div class="flex items-center gap-3 px-4 py-3">
    <a href="m.html#stats" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-slate-100 text-slate-600 active:scale-95 transition-transform" aria-label="Quay lại">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div class="min-w-0 flex-1">
      <h1 class="text-base font-bold tracking-tight truncate">Quảng cáo Facebook</h1>
      <p id="madsPeriodRange" class="text-[11px] text-slate-500 truncate">—</p>
    </div>
    <a href="settings.html" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-slate-500 active:bg-slate-100" aria-label="Cài đặt ngân sách QC" title="Cài đặt">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </a>
  </div>
  <!-- Period tabs -->
  <div class="px-4 pb-3">
    <div id="madsPeriodTabs" class="flex gap-1 rounded-xl bg-slate-100 p-1 no-scrollbar overflow-x-auto">
      <button type="button" data-period="yesterday" class="ptab flex-1 min-w-[4.5rem] rounded-lg py-2 text-xs font-medium text-slate-600 whitespace-nowrap">Hôm qua</button>
      <button type="button" data-period="today" class="ptab active flex-1 min-w-[4.5rem] rounded-lg py-2 text-xs font-medium text-slate-600 whitespace-nowrap">Hôm nay</button>
      <button type="button" data-period="7d" class="ptab flex-1 min-w-[4.5rem] rounded-lg py-2 text-xs font-medium text-slate-600 whitespace-nowrap">7 ngày</button>
      <button type="button" data-period="month" class="ptab flex-1 min-w-[4.5rem] rounded-lg py-2 text-xs font-medium text-slate-600 whitespace-nowrap">Tháng</button>
    </div>
  </div>
</header>

<main class="px-4 pt-5 pb-6 safe-bottom space-y-4" id="madsMain">

  <!-- Hero LN thực -->
  <section id="madsHero" class="mads-hero mads-hero--flat fade-up" aria-live="polite">
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0">
        <div class="flex flex-wrap items-center gap-1.5">
          <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">LN thực QC</span>
          <span id="madsHeroBadge" class="rounded-full px-2 py-0.5 text-[9px] font-bold uppercase bg-slate-100 text-slate-500">—</span>
        </div>
        <p id="madsHeroValue" class="mads-hero-val text-slate-900 mt-1.5">
          <span class="skeleton inline-block h-8 w-36 rounded-lg"></span>
        </p>
        <p id="madsHeroCmp" class="text-xs text-slate-500 mt-1"></p>
      </div>
      <div id="madsHeroFormula" class="shrink-0 rounded-xl bg-white/70 border border-slate-200/60 px-3 py-2 text-right text-[11px] text-slate-500 leading-relaxed">
        <span class="skeleton inline-block h-4 w-24 rounded"></span>
      </div>
    </div>
  </section>

  <!-- KPI grid -->
  <section class="grid grid-cols-2 gap-2.5 fade-up">
    <div class="mads-kpi">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Chi QC</p>
      <p id="madsKpiSpend" class="mads-kpi-val mt-1 text-base font-bold text-violet-700">—</p>
      <p id="madsKpiSpendHint" class="text-[10px] text-slate-400 mt-0.5 truncate">—</p>
    </div>
    <div class="mads-kpi">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Đơn QC</p>
      <p id="madsKpiOrders" class="mads-kpi-val mt-1 text-base font-bold text-slate-900">—</p>
      <p id="madsKpiOrdersShare" class="text-[10px] text-slate-400 mt-0.5 truncate"></p>
    </div>
    <div class="mads-kpi">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Doanh thu QC</p>
      <p id="madsKpiRevenue" class="mads-kpi-val mt-1 text-base font-bold text-slate-900">—</p>
      <p id="madsKpiRevenuePer" class="text-[10px] text-slate-400 mt-0.5 truncate">—</p>
    </div>
    <div class="mads-kpi">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-400">ROAS</p>
      <p id="madsKpiRoas" class="mads-kpi-val mt-1 text-base font-bold">—</p>
      <p id="madsKpiRoasHint" class="text-[10px] text-slate-400 mt-0.5 truncate">—</p>
    </div>
    <div class="mads-kpi">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-400">CPA</p>
      <p id="madsKpiCpa" class="mads-kpi-val mt-1 text-base font-bold text-slate-900">—</p>
      <p id="madsKpiCpaCmp" class="text-[10px] text-slate-400 mt-0.5 truncate"></p>
    </div>
    <div class="mads-kpi">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-400">LN thực/đơn</p>
      <p id="madsKpiPpo" class="mads-kpi-val mt-1 text-base font-bold">—</p>
      <p id="madsKpiMargin" class="text-[10px] text-slate-400 mt-0.5 truncate">—</p>
    </div>
  </section>

  <!-- Trend (7d / month) -->
  <section id="madsTrendSection" class="hidden fade-up rounded-2xl border border-slate-200/80 bg-white overflow-hidden shadow-sm">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
      <div>
        <h2 class="text-sm font-semibold text-slate-900">Xu hướng LN thực</h2>
        <p id="madsTrendSub" class="text-[10px] text-slate-400 mt-0.5">Theo ngày</p>
      </div>
      <p id="madsTrendInsights" class="text-[11px] font-semibold text-indigo-600"></p>
    </div>
    <div class="px-3 py-4">
      <div id="madsTrendChart" class="flex h-28 items-end justify-between gap-0.5"></div>
    </div>
  </section>

  <!-- Daily cards -->
  <section class="fade-up">
    <div class="flex items-center justify-between mb-2.5 px-0.5">
      <h2 class="text-sm font-semibold text-slate-900">10 ngày gần nhất</h2>
      <span id="madsDayCount" class="text-[10px] font-medium text-slate-400">10 ngày</span>
    </div>
    <div id="madsDayList" class="space-y-2.5">
      <div class="mads-day-card p-4 space-y-2">
        <div class="skeleton h-4 w-24 rounded"></div>
        <div class="skeleton h-3 w-full rounded mt-2"></div>
        <div class="skeleton h-3 w-2/3 rounded mt-1"></div>
      </div>
    </div>
  </section>

  <p class="text-center text-[10px] text-slate-400 px-2">
    Đơn Facebook = đơn QC · LN thực = LN gộp FB − Chi QC
    · <a href="ads.html" class="text-indigo-600 font-medium">Bản desktop</a>
  </p>
</main>

<!-- Edit spend sheet -->
<div id="madsEditSheet" class="fixed inset-0 z-50 hidden" aria-hidden="true">
  <div id="madsEditBackdrop" class="sheet-backdrop absolute inset-0 bg-slate-900/45"></div>
  <div class="absolute inset-x-0 bottom-0 sheet-panel safe-bottom">
    <div class="mx-auto max-w-lg rounded-t-2xl bg-white border border-slate-200 shadow-2xl px-5 pt-5 pb-6">
      <div class="mx-auto mb-4 h-1 w-10 rounded-full bg-slate-200"></div>
      <h3 class="text-base font-bold text-slate-900">Sửa chi QC</h3>
      <p id="madsEditDate" class="text-sm text-slate-500 mt-0.5">—</p>
      <label class="block mt-4 text-xs font-semibold text-slate-600" for="madsEditAmount">Số tiền (VNĐ)</label>
      <input id="madsEditAmount" type="number" min="0" step="1000" inputmode="numeric"
        class="mt-1.5 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-base font-semibold tabular-nums focus:border-indigo-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
      <div class="mt-5 flex gap-2">
        <button type="button" id="madsEditCancel" class="flex-1 rounded-xl border border-slate-200 py-3 text-sm font-semibold text-slate-700 active:bg-slate-50">Huỷ</button>
        <button type="button" id="madsEditSave" class="flex-1 rounded-xl bg-indigo-600 py-3 text-sm font-semibold text-white active:bg-indigo-700">Lưu</button>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/toast-manager.js"></script>
<script src="../assets/js/m-ads.js"></script>
<script src="../assets/js/auth-check.js"></script>
</body>
</html>
