<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Thống kê — Mobile</title>
<link rel="icon" type="image/svg+xml" href="../shop/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{-webkit-tap-highlight-color:transparent}
body{overscroll-behavior-y:contain}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.2s infinite}
@keyframes sk{to{background-position:-200% 0}}
.ptab{transition:all .15s}
.ptab.active{background:#6366f1;color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.bar{transition:width .4s cubic-bezier(0.4,0,0.2,1)}
.sheet-up{animation:sheetUp .25s cubic-bezier(0.32,0.72,0,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.dm-tab.active{background:#fff;color:#4f46e5;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.month-btn{transition:all .15s}
.month-btn.active{background:#6366f1;color:#fff;font-weight:600;border-color:transparent;box-shadow:0 2px 6px rgba(99,102,241,.3)}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
</style>
</head>
<body class="bg-gray-50 min-h-screen max-w-lg mx-auto">

<!-- Header -->
<header class="sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3">
  <div class="flex items-center gap-2">
    <a href="m.html" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 shrink-0">
      <svg class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-lg font-bold text-gray-900 flex-1">Thống kê</h1>
    <button onclick="doRefresh()" id="refreshBtn" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100">
      <svg id="refreshIcon" class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    </button>
  </div>
</header>

<!-- Period tabs -->
<div class="sticky top-[57px] z-30 bg-white border-b border-gray-100 px-3 py-2.5">
  <div class="flex gap-1 overflow-x-auto no-scrollbar">
    <button onclick="setPeriod('today')" data-p="today" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500">Hôm nay</button>
    <button onclick="setPeriod('week')" data-p="week" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500">Tuần</button>
    <button onclick="setPeriod('month')" data-p="month" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500">Tháng</button>
    <button onclick="setPeriod('quarter')" data-p="quarter" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500">3 tháng</button>
    <button onclick="setPeriod('half-year')" data-p="half-year" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500">6 tháng</button>
    <button onclick="setPeriod('year')" data-p="year" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500">Năm</button>
    <button onclick="openDatePicker()" data-p="custom" class="ptab shrink-0 px-3 py-1.5 rounded-lg text-xs text-gray-500 flex items-center gap-1">
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      <span id="customLabel">Chọn ngày</span>
    </button>
  </div>
</div>

<!-- Date Picker Sheet -->
<div id="dateSheet" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeDateSheet()"></div>
  <div class="absolute bottom-0 left-0 right-0 max-w-lg mx-auto bg-white rounded-t-2xl sheet-up max-h-[85vh] overflow-y-auto">
    <div class="flex items-center justify-between px-5 pt-5 pb-3">
      <h3 class="text-base font-bold text-gray-900">Chọn thời gian</h3>
      <button onclick="closeDateSheet()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
        <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Chọn nhanh theo tháng -->
    <div class="px-5 pb-4">
      <div class="border border-gray-200 rounded-xl p-3.5">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-2.5">Chọn nhanh theo tháng</p>
        <select id="dpYear" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm mb-2.5" onchange="renderMonthGrid()"></select>
        <div id="monthGrid" class="grid grid-cols-4 gap-2"></div>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="px-5 pb-3">
      <div class="flex bg-gray-100 rounded-lg p-1 gap-1">
        <button onclick="setDateMode('day')" data-dm="day" class="dm-tab flex-1 py-2 rounded-md text-xs font-medium text-gray-500 transition-all">Một ngày</button>
        <button onclick="setDateMode('range')" data-dm="range" class="dm-tab flex-1 py-2 rounded-md text-xs font-medium text-gray-500 transition-all">Khoảng thời gian</button>
      </div>
    </div>

    <!-- Day picker -->
    <div id="dayPicker" class="px-5 pb-4 hidden">
      <p class="text-sm font-medium text-gray-700 mb-2">Chọn ngày</p>
      <input type="date" id="dpDay" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
    </div>

    <!-- Range picker -->
    <div id="rangePicker" class="px-5 pb-4 hidden">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <p class="text-sm font-medium text-gray-700 mb-2">Từ ngày</p>
          <input type="date" id="dpStart" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
        </div>
        <div>
          <p class="text-sm font-medium text-gray-700 mb-2">Đến ngày</p>
          <input type="date" id="dpEnd" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="px-5 pb-6 flex gap-3">
      <button onclick="clearCustomDate()" class="flex-1 py-3 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">Xóa bộ lọc</button>
      <button onclick="applyCustomDate()" class="flex-1 py-3 rounded-xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 transition-colors">Áp dụng</button>
    </div>
  </div>
</div>

<div class="p-4 pb-12">
  <!-- Skeleton -->
  <div id="skeleton" class="space-y-4">
    <div class="grid grid-cols-2 gap-3"><div class="col-span-2 h-28 skeleton rounded-2xl"></div><div class="h-24 skeleton rounded-2xl"></div><div class="h-24 skeleton rounded-2xl"></div></div>
    <div class="grid grid-cols-2 gap-3"><div class="h-20 skeleton rounded-2xl"></div><div class="h-20 skeleton rounded-2xl"></div><div class="h-20 skeleton rounded-2xl"></div><div class="h-20 skeleton rounded-2xl"></div></div>
    <div class="h-48 skeleton rounded-2xl"></div>
    <div class="h-56 skeleton rounded-2xl"></div>
  </div>
  <div id="content" class="hidden space-y-4"></div>
  <div id="errMsg" class="hidden text-center py-16 text-gray-400 text-sm"></div>
</div>

<script defer src="../assets/js/config.js"></script>
<script>
const API=()=>(window.CONFIG?.API_URL||'http://127.0.0.1:8787');
const fmt=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n||0))+'đ';
const fmtK=n=>{
  if(!n&&n!==0)return'—';
  const abs=Math.abs(n),sign=n<0?'-':'';
  if(abs>=1e9)return sign+(abs/1e9).toFixed(1).replace(/\.0$/,'')+'tỷ';
  if(abs>=1e6)return sign+(abs/1e6).toFixed(1).replace(/\.0$/,'')+'tr';
  if(abs>=1e3)return sign+Math.round(abs/1e3)+'k';
  return sign+abs+'đ';
};
const fmtN=n=>new Intl.NumberFormat('vi-VN').format(n||0);

let currentPeriod='week';
const cache={};
let currentOrders=[];
const ORDER_PAGE_SIZE=15;
let orderPage=1;
let customRange=null; // {startDate:'2026-01-01', endDate:'2026-01-31'}
let dateMode='day'; // 'day' or 'range'

function setPeriod(p){
  currentPeriod=p;
  if(p!=='custom')customRange=null;
  document.querySelectorAll('.ptab').forEach(t=>{
    t.classList.toggle('active',t.dataset.p===p);
    t.classList.toggle('text-gray-500',t.dataset.p!==p);
  });
  if(p!=='custom')document.getElementById('customLabel').textContent='Chọn ngày';
  loadData();
}

async function doRefresh(){delete cache[currentPeriod];loadData();}

async function loadData(){
  const cacheKey=currentPeriod==='custom'&&customRange?`c_${customRange.startDate}_${customRange.endDate}`:currentPeriod;
  if(cache[cacheKey]){renderAll(cache[cacheKey]);return;}
  document.getElementById('skeleton').classList.remove('hidden');
  document.getElementById('content').classList.add('hidden');
  document.getElementById('errMsg').classList.add('hidden');
  const icon=document.getElementById('refreshIcon');
  icon.classList.add('animate-spin');
  try{
    let url=`${API()}?action=getDetailedAnalytics&period=${currentPeriod==='custom'?'all':currentPeriod}&timestamp=${Date.now()}`;
    if(currentPeriod==='custom'&&customRange){
      const s=new Date(customRange.startDate+'T00:00:00+07:00');
      const e=new Date(customRange.endDate+'T23:59:59.999+07:00');
      url+=`&startDate=${s.toISOString()}&endDate=${e.toISOString()}`;
    }
    const r=await fetch(url);
    const d=await r.json();
    if(d.success){cache[cacheKey]=d;renderAll(d);}
    else throw new Error(d.error||'Lỗi tải dữ liệu');
  }catch(e){
    document.getElementById('skeleton').classList.add('hidden');
    document.getElementById('errMsg').textContent='Lỗi: '+e.message;
    document.getElementById('errMsg').classList.remove('hidden');
  }finally{icon.classList.remove('animate-spin');}
}

function renderAll(d){
  const o=d.overview;
  const cb=d.cost_breakdown;
  const topProds=(d.top_products||[]);

  const isProfit=o.total_profit>=0;
  const maxBar=Math.max(o.total_revenue,o.total_cost,1);
  const revW=Math.round(o.total_revenue/maxBar*100);
  const costW=Math.round(o.total_cost/maxBar*100);

  const periodLabel={today:'Hôm nay',week:'Tuần này',month:'Tháng này',quarter:'3 tháng',['half-year']:'6 tháng',year:'Năm nay'}[currentPeriod]||'';

  // Cost breakdown rows
  const costRows=[
    {icon:'📦',label:'Giá vốn SP',val:cb.product_cost},
    {icon:'🚚',label:'Vận chuyển',val:cb.shipping_cost},
    {icon:'📦',label:'Đóng gói',val:(o.packaging_cost||0)},
    {icon:'👥',label:'Hoa hồng CTV',val:cb.commission},
    {icon:'🧾',label:'Thuế',val:cb.tax},
  ].filter(r=>r.val>0);

  // Top products rows
  const topProdHtml=topProds.length?topProds.map((p,i)=>{
    const margin=p.profit_margin||0;
    const barCol=margin>=30?'bg-green-400':margin>=15?'bg-yellow-400':'bg-red-400';
    return`<div class="flex items-center gap-3 px-4 py-3 border-b border-gray-50 last:border-0">
      <span class="w-6 h-6 rounded-full ${i<3?'bg-indigo-600 text-white':'bg-gray-100 text-gray-500'} text-[11px] font-bold flex items-center justify-center shrink-0">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">${p.product_name||'—'}</p>
        <div class="flex items-center gap-3 mt-1 text-[11px] text-gray-400">
          <span>Bán: <b class="text-gray-600">${fmtN(p.total_sold)}</b></span>
          <span>Lãi: <b class="${(p.total_profit||0)>=0?'text-green-600':'text-red-500'}">${fmtK(p.total_profit)}</b></span>
        </div>
        <div class="mt-1.5 bg-gray-100 rounded-full h-1 overflow-hidden">
          <div class="bar h-1 ${barCol} rounded-full" style="width:${Math.min(margin,100)}%"></div>
        </div>
      </div>
      <div class="text-right shrink-0">
        <p class="text-sm font-bold text-gray-900">${fmtK(p.total_revenue)}</p>
        <p class="text-[11px] font-semibold ${margin>=20?'text-green-600':'text-orange-500'}">${margin.toFixed(1)}%</p>
      </div>
    </div>`;
  }).join(''):'<p class="px-4 py-6 text-sm text-gray-400 text-center">Chưa có dữ liệu sản phẩm</p>';

  const html=`
    <!-- KPI chính -->
    <div class="bg-white rounded-2xl border border-gray-100 p-4">
      <div class="flex items-start justify-between mb-3">
        <div>
          <p class="text-xs text-gray-400 font-medium uppercase tracking-wide">${periodLabel}</p>
          <p class="text-2xl font-bold text-gray-900 mt-0.5">${fmt(o.total_revenue)}</p>
          <p class="text-xs text-gray-400 mt-1">Doanh thu · ${fmtN(o.total_orders)} đơn</p>
        </div>
        <div class="text-right">
          <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold ${isProfit?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}">
            ${isProfit?'▲':'▼'} ${Math.abs(o.profit_margin).toFixed(1)}%
          </span>
          <p class="text-xs text-gray-400 mt-1">Tỷ suất lãi</p>
        </div>
      </div>
      <div class="space-y-2">
        <div class="flex items-center gap-2.5">
          <span class="text-[11px] text-gray-400 w-14 shrink-0">Doanh thu</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden"><div class="bar h-2 bg-indigo-500 rounded-full" style="width:${revW}%"></div></div>
          <span class="text-[11px] font-semibold text-gray-700 text-right shrink-0">${fmt(o.total_revenue)}</span>
        </div>
        <div class="flex items-center gap-2.5">
          <span class="text-[11px] text-gray-400 w-14 shrink-0">Chi phí</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden"><div class="bar h-2 bg-rose-400 rounded-full" style="width:${costW}%"></div></div>
          <span class="text-[11px] font-semibold text-gray-700 text-right shrink-0">${fmt(o.total_cost)}</span>
        </div>
      </div>
    </div>

    <!-- 4 KPI cards nhỏ -->
    <div class="grid grid-cols-2 gap-3">
      <div class="${isProfit?'bg-green-50 border-green-100':'bg-red-50 border-red-100'} rounded-2xl p-3.5 border">
        <p class="text-[10px] ${isProfit?'text-green-500':'text-red-400'} font-medium uppercase tracking-wide">Lợi nhuận</p>
        <p class="text-base font-bold ${isProfit?'text-green-600':'text-red-500'} mt-1">${fmt(o.total_profit)}</p>
        <p class="text-[11px] text-gray-400 mt-0.5">TB: ${fmt(o.avg_profit_per_order)}/đơn</p>
      </div>
      <div class="bg-white rounded-2xl p-3.5 border border-gray-100">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wide">Đơn hàng</p>
        <p class="text-lg font-bold text-gray-900 mt-1">${fmtN(o.total_orders)}</p>
        <p class="text-[11px] text-gray-400 mt-0.5">TB: ${fmt(o.avg_revenue_per_order)}/đơn</p>
      </div>
      <div class="bg-white rounded-2xl p-3.5 border border-gray-100">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wide">SP đã bán</p>
        <p class="text-lg font-bold text-gray-900 mt-1">${fmtN(o.total_products_sold)}</p>
      </div>
      <div class="bg-white rounded-2xl p-3.5 border border-gray-100">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wide">Khách hàng</p>
        <p class="text-lg font-bold text-gray-900 mt-1">${fmtN(o.unique_customers)}</p>
        <p class="text-[11px] text-gray-400 mt-0.5">${o.unique_customers>0?(o.total_orders/o.unique_customers).toFixed(1):0} đơn/KH</p>
      </div>
    </div>

    <!-- Hoa hồng -->
    <div class="bg-amber-50 rounded-2xl p-3.5 border border-amber-100 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-amber-200 flex items-center justify-center shrink-0">
          <svg class="w-4 h-4 text-amber-700" fill="currentColor" viewBox="0 0 20 20"><path d="M8 5a1 1 0 100 2h5.586l-1.293 1.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L13.586 5H8zM12 15a1 1 0 100-2H6.414l1.293-1.293a1 1 0 10-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L6.414 15H12z"/></svg>
        </div>
        <div>
          <p class="text-xs font-medium text-amber-800">Hoa hồng CTV</p>
          <p class="text-[11px] text-amber-600">${o.total_revenue>0?((o.commission||0)/o.total_revenue*100).toFixed(1):'0'}% doanh thu</p>
        </div>
      </div>
      <p class="text-base font-bold text-amber-700">${fmt(o.commission)}</p>
    </div>

    <!-- Chi phí chi tiết -->
    ${costRows.length?`
    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <div class="px-4 pt-3.5 pb-2 flex items-center justify-between">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide">Chi phí chi tiết</h3>
        <span class="text-xs font-bold text-gray-900">${fmt(o.total_cost)}</span>
      </div>
      ${costRows.map(r=>{
        const barW=o.total_cost>0?Math.round(r.val/o.total_cost*100):0;
        return`<div class="px-4 py-2.5 border-t border-gray-50">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm text-gray-600">${r.icon} ${r.label}</span>
            <div class="flex items-center gap-2">
              <span class="text-[11px] text-gray-400">${barW}%</span>
              <span class="text-sm font-semibold text-gray-700">${fmtK(r.val)}</span>
            </div>
          </div>
          <div class="bg-gray-100 rounded-full h-1 overflow-hidden"><div class="bar h-1 bg-rose-300 rounded-full" style="width:${barW}%"></div></div>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- Sản phẩm bán chạy -->
    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <div class="px-4 pt-3.5 pb-2">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide">Sản phẩm bán chạy</h3>
      </div>
      ${topProdHtml}
    </div>

    <!-- Danh sách đơn hàng gần đây (nếu có) -->
    ${d.orders&&d.orders.length?`
    <div>
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3 px-0.5">Đơn hàng · ${d.orders.length} đơn</h3>
      <div id="orderList" class="space-y-2"></div>
      <div id="loadMoreWrap" class="mt-3"></div>
    </div>`:''}
  `;

  document.getElementById('content').innerHTML=html;
  document.getElementById('skeleton').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  // Animate bars
  requestAnimationFrame(()=>{
    document.querySelectorAll('.bar').forEach(b=>{
      const w=b.style.width;b.style.width='0%';
      requestAnimationFrame(()=>{b.style.width=w;});
    });
  });

  // Order list pagination (only if orders exist in response)
  if(d.orders&&d.orders.length){
    currentOrders=d.orders;
    orderPage=1;
    renderOrderList();
  }
}

function renderOrderList(){
  const list=document.getElementById('orderList');
  const wrap=document.getElementById('loadMoreWrap');
  if(!list||!wrap)return;
  const slice=currentOrders.slice(0,orderPage*ORDER_PAGE_SIZE);
  const remaining=currentOrders.length-slice.length;

  list.innerHTML=slice.map(o=>{
    const pc=(o.profit||0)>=0;
    const d=new Date(o.created_at_unix);
    const ds=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    return`<div class="bg-white rounded-xl px-4 py-3 border border-gray-100 flex items-center gap-3">
      <div class="min-w-0 flex-1">
        <p class="text-sm font-semibold text-gray-900 truncate">${o.customer_name||'—'}</p>
        <p class="text-xs text-gray-400 mt-0.5">${ds} · ${o.order_id||''}</p>
      </div>
      <div class="text-right shrink-0">
        <p class="text-sm font-bold text-gray-900">${fmtK(o.total_amount)}</p>
        <p class="text-xs font-semibold ${pc?'text-green-500':'text-red-400'} mt-0.5">${pc?'+':''}${fmtK(o.profit)}</p>
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML=remaining>0
    ?`<button onclick="loadMoreOrders()" class="w-full py-3 rounded-xl bg-white border border-gray-200 text-sm font-semibold text-indigo-600 hover:bg-indigo-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        Xem thêm ${remaining} đơn
      </button>`
    :(currentOrders.length>ORDER_PAGE_SIZE
      ?`<p class="text-xs text-center text-gray-400 py-2">Đã hiển thị tất cả ${currentOrders.length} đơn</p>`
      :'');
}

function loadMoreOrders(){
  orderPage++;
  renderOrderList();
  const items=document.getElementById('orderList').children;
  const firstNew=items[(orderPage-1)*ORDER_PAGE_SIZE];
  if(firstNew)firstNew.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ─── Date Picker ───
function openDatePicker(){
  const sheet=document.getElementById('dateSheet');
  sheet.classList.remove('hidden');
  document.body.style.overflow='hidden';
  // Init year select
  const ySel=document.getElementById('dpYear');
  if(!ySel.options.length){
    const cur=new Date().getFullYear();
    for(let y=cur;y>=cur-5;y--){
      const opt=document.createElement('option');opt.value=y;opt.textContent='Năm '+y;
      ySel.appendChild(opt);
    }
  }
  renderMonthGrid();
  // Init date inputs to today
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});
  if(!document.getElementById('dpDay').value)document.getElementById('dpDay').value=today;
  if(!document.getElementById('dpStart').value)document.getElementById('dpStart').value=today;
  if(!document.getElementById('dpEnd').value)document.getElementById('dpEnd').value=today;
  setDateMode(dateMode);
}

function closeDateSheet(){
  document.getElementById('dateSheet').classList.add('hidden');
  document.body.style.overflow='';
}

function renderMonthGrid(){
  const y=parseInt(document.getElementById('dpYear').value);
  const grid=document.getElementById('monthGrid');
  const now=new Date();
  const curY=now.getFullYear(), curM=now.getMonth();
  grid.innerHTML='';
  for(let m=0;m<12;m++){
    const disabled=y===curY&&m>curM;
    const btn=document.createElement('button');
    btn.type='button';
    btn.className=`month-btn py-2 rounded-lg text-xs border border-gray-200 ${disabled?'opacity-30 cursor-not-allowed':'hover:border-indigo-300 hover:bg-indigo-50'}`;
    btn.textContent='Tháng '+(m+1);
    btn.dataset.m=m;
    if(!disabled)btn.onclick=()=>pickMonth(y,m);
    grid.appendChild(btn);
  }
}

function pickMonth(y,m){
  // Highlight selected
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.month-btn[data-m="${m}"]`)?.classList.add('active');
  // Set range
  const start=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const lastDay=new Date(y,m+1,0).getDate();
  const end=`${y}-${String(m+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  customRange={startDate:start,endDate:end};
  currentPeriod='custom';
  updateTabActive('custom');
  document.getElementById('customLabel').textContent=`T${m+1}/${y}`;
  closeDateSheet();
  loadData();
}

function setDateMode(mode){
  dateMode=mode;
  document.querySelectorAll('.dm-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.dm===mode);
    t.classList.toggle('text-gray-500',t.dataset.dm!==mode);
  });
  document.getElementById('dayPicker').classList.toggle('hidden',mode!=='day');
  document.getElementById('rangePicker').classList.toggle('hidden',mode!=='range');
}

function applyCustomDate(){
  if(dateMode==='day'){
    const day=document.getElementById('dpDay').value;
    if(!day)return;
    customRange={startDate:day,endDate:day};
    const d=new Date(day+'T00:00:00+07:00');
    document.getElementById('customLabel').textContent=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  }else{
    const s=document.getElementById('dpStart').value;
    const e=document.getElementById('dpEnd').value;
    if(!s||!e)return;
    if(s>e){document.getElementById('dpStart').classList.add('border-red-400');return;}
    customRange={startDate:s,endDate:e};
    const ds=new Date(s+'T00:00:00+07:00');
    const de=new Date(e+'T00:00:00+07:00');
    document.getElementById('customLabel').textContent=`${String(ds.getDate()).padStart(2,'0')}/${String(ds.getMonth()+1).padStart(2,'0')} - ${String(de.getDate()).padStart(2,'0')}/${String(de.getMonth()+1).padStart(2,'0')}`;
  }
  currentPeriod='custom';
  updateTabActive('custom');
  closeDateSheet();
  loadData();
}

function clearCustomDate(){
  customRange=null;
  document.getElementById('customLabel').textContent='Chọn ngày';
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  closeDateSheet();
  setPeriod('week');
}

function updateTabActive(p){
  document.querySelectorAll('.ptab').forEach(t=>{
    t.classList.toggle('active',t.dataset.p===p);
    t.classList.toggle('text-gray-500',t.dataset.p!==p);
  });
}

// Init
document.querySelector('[data-p="week"]').classList.add('active');
document.querySelector('[data-p="week"]').classList.remove('text-gray-500');
loadData();
</script>
</body>
</html>
