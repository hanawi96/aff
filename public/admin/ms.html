<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Thống kê — Mobile</title>
<link rel="icon" type="image/svg+xml" href="../shop/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{-webkit-tap-highlight-color:transparent}
body{overscroll-behavior-y:contain}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.2s infinite}
@keyframes sk{to{background-position:-200% 0}}
.ptab{transition:all .15s}
.ptab.active{background:#6366f1;color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.bar{transition:width .4s cubic-bezier(0.4,0,0.2,1)}
.sheet-up{animation:sheetUp .25s cubic-bezier(0.32,0.72,0,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.dm-tab.active{background:#fff;color:#4f46e5;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.month-btn{transition:all .15s}
.month-btn.active{background:#6366f1;color:#fff;font-weight:600;border-color:transparent;box-shadow:0 2px 6px rgba(99,102,241,.3)}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.ct-tab.active{background:#fff;color:#4f46e5;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
</style>
</head>
<body class="bg-gray-50 min-h-screen max-w-lg mx-auto">

<!-- Header -->
<header class="sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3">
  <div class="flex items-center gap-2">
    <a href="m.html" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 shrink-0">
      <svg class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-lg font-bold text-gray-900 flex-1">Thống kê</h1>
    <button onclick="doRefresh()" id="refreshBtn" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100">
      <svg id="refreshIcon" class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    </button>
  </div>
</header>

<!-- Period tabs -->
<div class="sticky top-[57px] z-30 bg-white border-b border-gray-100 px-3 py-2.5">
  <div class="flex gap-1 overflow-x-auto no-scrollbar">
    <button onclick="setPeriod('yesterday')" data-p="yesterday" class="ptab flex-1 min-w-0 px-1 py-1.5 rounded-lg text-xs text-gray-500">H.qua</button>
    <button onclick="setPeriod('today')" data-p="today" class="ptab flex-1 min-w-0 px-1 py-1.5 rounded-lg text-xs text-gray-500">H.nay</button>
    <button onclick="setPeriod('week')" data-p="week" class="ptab flex-1 min-w-0 px-1 py-1.5 rounded-lg text-xs text-gray-500">7 ng</button>
    <button onclick="setPeriod('month')" data-p="month" class="ptab flex-1 min-w-0 px-1 py-1.5 rounded-lg text-xs text-gray-500">30 ng</button>
    <button onclick="openDatePicker()" data-p="custom" class="ptab flex-1 min-w-0 px-1 py-1.5 rounded-lg text-xs text-gray-500 flex items-center justify-center gap-1">
      <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      <span id="customLabel" class="truncate">Chọn</span>
    </button>
  </div>
</div>

<!-- Date Picker Sheet -->
<div id="dateSheet" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="closeDateSheet()"></div>
  <div class="absolute bottom-0 left-0 right-0 max-w-lg mx-auto bg-white rounded-t-2xl sheet-up max-h-[85vh] overflow-y-auto">
    <div class="flex items-center justify-between px-5 pt-5 pb-3">
      <h3 class="text-base font-bold text-gray-900">Chọn thời gian</h3>
      <button onclick="closeDateSheet()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
        <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Chọn nhanh theo tháng -->
    <div class="px-5 pb-4">
      <div class="border border-gray-200 rounded-xl p-3.5">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-2.5">Chọn nhanh theo tháng</p>
        <select id="dpYear" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm mb-2.5" onchange="renderMonthGrid()"></select>
        <div id="monthGrid" class="grid grid-cols-4 gap-2"></div>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="px-5 pb-3">
      <div class="flex bg-gray-100 rounded-lg p-1 gap-1">
        <button onclick="setDateMode('day')" data-dm="day" class="dm-tab flex-1 py-2 rounded-md text-xs font-medium text-gray-500 transition-all">Một ngày</button>
        <button onclick="setDateMode('range')" data-dm="range" class="dm-tab flex-1 py-2 rounded-md text-xs font-medium text-gray-500 transition-all">Khoảng thời gian</button>
      </div>
    </div>

    <!-- Day picker -->
    <div id="dayPicker" class="px-5 pb-4 hidden">
      <p class="text-sm font-medium text-gray-700 mb-2">Chọn ngày</p>
      <div class="relative">
        <input type="date" id="dpDay" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/30" style="color:transparent" onchange="syncDateDisplay(this,'dpDayDisplay')">
        <span id="dpDayDisplay" class="absolute inset-0 flex items-center px-3.5 text-sm text-gray-900 pointer-events-none">dd/mm/yyyy</span>
      </div>
    </div>

    <!-- Range picker -->
    <div id="rangePicker" class="px-5 pb-4 hidden">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <p class="text-sm font-medium text-gray-700 mb-2">Từ ngày</p>
          <div class="relative">
            <input type="date" id="dpStart" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/30" style="color:transparent" onchange="syncDateDisplay(this,'dpStartDisplay')">
            <span id="dpStartDisplay" class="absolute inset-0 flex items-center px-3.5 text-sm text-gray-900 pointer-events-none">dd/mm/yyyy</span>
          </div>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-700 mb-2">Đến ngày</p>
          <div class="relative">
            <input type="date" id="dpEnd" class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/30" style="color:transparent" onchange="syncDateDisplay(this,'dpEndDisplay')">
            <span id="dpEndDisplay" class="absolute inset-0 flex items-center px-3.5 text-sm text-gray-900 pointer-events-none">dd/mm/yyyy</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="px-5 pb-6 flex gap-3">
      <button onclick="clearCustomDate()" class="flex-1 py-3 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">Xóa bộ lọc</button>
      <button onclick="applyCustomDate()" class="flex-1 py-3 rounded-xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 transition-colors">Áp dụng</button>
    </div>
  </div>
</div>

<div class="p-4 pb-12">
  <!-- Skeleton -->
  <div id="skeleton" class="space-y-4">
    <div class="grid grid-cols-2 gap-3"><div class="col-span-2 h-28 skeleton rounded-2xl"></div><div class="h-24 skeleton rounded-2xl"></div><div class="h-24 skeleton rounded-2xl"></div></div>
    <div class="grid grid-cols-2 gap-3"><div class="h-20 skeleton rounded-2xl"></div><div class="h-20 skeleton rounded-2xl"></div><div class="h-20 skeleton rounded-2xl"></div><div class="h-20 skeleton rounded-2xl"></div></div>
    <div class="h-48 skeleton rounded-2xl"></div>
    <div class="h-56 skeleton rounded-2xl"></div>
  </div>
  <div id="content" class="hidden space-y-4"></div>
  <div id="errMsg" class="hidden text-center py-16 text-gray-400 text-sm"></div>
</div>

<script src="../assets/js/config.js"></script>
<script>
const API=()=>(window.CONFIG?.API_URL||'http://127.0.0.1:8787');
const fmt=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n||0))+'đ';
const fmtK=n=>{
  if(!n&&n!==0)return'—';
  const abs=Math.abs(n),sign=n<0?'-':'';
  if(abs>=1e9)return sign+(abs/1e9).toFixed(1).replace(/\.0$/,'')+'tỷ';
  if(abs>=1e6)return sign+(abs/1e6).toFixed(1).replace(/\.0$/,'')+'tr';
  if(abs>=1e3)return sign+Math.round(abs/1e3)+'k';
  return sign+abs+'đ';
};
const fmtN=n=>new Intl.NumberFormat('vi-VN').format(n||0);

let currentPeriod='today';
const cache={};
let currentOrders=[];
const ORDER_PAGE_SIZE=15;
let orderPage=1;
let customRange=null; // {startDate:'2026-01-01', endDate:'2026-01-31'}
let dateMode='day'; // 'day' or 'range'
let _cMeta=null;
let _chartMode='rev';

function setPeriod(p){
  currentPeriod=p;
  if(p!=='custom')customRange=null;
  document.querySelectorAll('.ptab').forEach(t=>{
    t.classList.toggle('active',t.dataset.p===p);
    t.classList.toggle('text-gray-500',t.dataset.p!==p);
  });
  if(p!=='custom')document.getElementById('customLabel').textContent='Chọn ngày';
  loadData();
}

function getDateRange(){
  const vn=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});
  const t0=vn+'T00:00:00+07:00';
  if(currentPeriod==='yesterday'){const d=new Date(new Date(t0).getTime()-864e5).toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});return{s:d,e:d};}
  if(currentPeriod==='today')return{s:vn,e:vn};
  if(currentPeriod==='week')return{s:new Date(new Date(t0).getTime()-6*864e5).toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'}),e:vn};
  if(currentPeriod==='month')return{s:new Date(new Date(t0).getTime()-29*864e5).toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'}),e:vn};
  if(currentPeriod==='custom'&&customRange)return{s:customRange.startDate,e:customRange.endDate};
  return null;
}
function calcPrevRange(ss,ee){
  const s=new Date(ss+'T12:00:00+07:00'),e=new Date(ee+'T12:00:00+07:00');
  const dur=e-s+864e5;
  const pe=new Date(s-864e5),ps=new Date(s-dur);
  return{s:ps.toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'}),e:pe.toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'})};
}
function cmp(cur,prev){
  if(prev==null)return'';
  if(!prev&&!cur)return'';
  if(!prev)return'<span class="ml-1.5 inline-flex items-center text-[10px] font-semibold text-green-500">↑ mới</span>';
  const p=(cur-prev)/Math.abs(prev)*100;const up=p>=0;
  const abs=Math.abs(p);const ds=abs>=100?Math.round(abs):abs.toFixed(1);
  return`<span class="ml-1.5 inline-flex items-center text-[10px] font-semibold ${up?'text-green-500':'text-red-400'}">${up?'↑':'↓'}${ds}%</span>`;
}

async function doRefresh(){
  const ck=currentPeriod==='custom'&&customRange?`c_${customRange.startDate}_${customRange.endDate}`:currentPeriod;
  delete cache[ck];loadData();
}

async function loadData(){
  const cacheKey=currentPeriod==='custom'&&customRange?`c_${customRange.startDate}_${customRange.endDate}`:currentPeriod;
  if(cache[cacheKey]){renderAll(cache[cacheKey].cur,cache[cacheKey].prev);return;}
  const skShow=document.getElementById('skeleton');if(skShow)skShow.classList.remove('hidden');
  const ctHide=document.getElementById('content');if(ctHide)ctHide.classList.add('hidden');
  const emHide=document.getElementById('errMsg');if(emHide)emHide.classList.add('hidden');
  const icon=document.getElementById('refreshIcon');
  icon?.classList.add('animate-spin');
  try{
    const range=getDateRange();
    if(!range)throw new Error('Không xác định khoảng thời gian');
    const base=`${API()}?action=getDetailedAnalytics&period=all&timestamp=${Date.now()}`;
    const mkUrl=(a,b)=>base+`&startDate=${new Date(a+'T00:00:00+07:00').toISOString()}&endDate=${new Date(b+'T23:59:59.999+07:00').toISOString()}`;
    const prev=calcPrevRange(range.s,range.e);
    const [cr,pr]=await Promise.all([fetch(mkUrl(range.s,range.e)).then(r=>r.json()),fetch(mkUrl(prev.s,prev.e)).then(r=>r.json())]);
    if(cr.success){
      cache[cacheKey]={cur:cr,prev:pr.success?pr:null};
      renderAll(cr,pr.success?pr:null);
    }else throw new Error(cr.error||'Lỗi tải dữ liệu');
  }catch(e){
    const sk=document.getElementById('skeleton');if(sk)sk.classList.add('hidden');
    const em=document.getElementById('errMsg');
    if(em){
      em.innerHTML=`<div class="text-left text-xs space-y-1 max-w-md mx-auto">
        <p class="text-red-500 font-bold">Lỗi: ${e.message}</p>
        <p class="text-gray-400">API: ${API()}</p>
        <p class="text-gray-400">CONFIG: ${JSON.stringify(window.CONFIG?.API_URL||'undefined')}</p>
        <p class="text-gray-400">Host: ${location.hostname}</p>
        <p class="text-gray-400 break-all">Stack: ${e.stack?.substring(0,200)||'N/A'}</p>
      </div>`;
      em.classList.remove('hidden');
    }
  }finally{icon?.classList.remove('animate-spin');}
}

function renderAll(d,prev){
  const o=d.overview;
  const po=prev?.overview||null;
  const cb=d.cost_breakdown;
  const topProds=(d.top_products||[]);

  const isProfit=o.total_profit>=0;
  const maxBar=Math.max(o.total_revenue,o.total_cost,1);
  const revW=Math.round(o.total_revenue/maxBar*100);
  const costW=Math.round(o.total_cost/maxBar*100);

  const periodLabel={yesterday:'Hôm qua',today:'Hôm nay',week:'7 ngày qua',month:'30 ngày qua',custom:document.getElementById('customLabel')?.textContent||'Tùy chọn'}[currentPeriod]||'';

  // Cost breakdown rows
  const costRows=[
    {icon:'📦',label:'Giá vốn SP',val:cb.product_cost},
    {icon:'🚚',label:'Vận chuyển',val:cb.shipping_cost},
    {icon:'📦',label:'Đóng gói',val:(o.packaging_cost||0)},
    {icon:'👥',label:'Hoa hồng CTV',val:cb.commission},
    {icon:'🧾',label:'Thuế',val:cb.tax},
  ].filter(r=>r.val>0);

  // Top products rows
  const topProdHtml=topProds.length?topProds.map((p,i)=>{
    const margin=p.profit_margin||0;
    const barCol=margin>=30?'bg-green-400':margin>=15?'bg-yellow-400':'bg-red-400';
    return`<div class="flex items-center gap-3 px-4 py-3 border-b border-gray-50 last:border-0">
      <span class="w-6 h-6 rounded-full ${i<3?'bg-indigo-600 text-white':'bg-gray-100 text-gray-500'} text-[11px] font-bold flex items-center justify-center shrink-0">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">${p.product_name||'—'}</p>
        <div class="flex items-center gap-3 mt-1 text-[11px] text-gray-400">
          <span>Bán: <b class="text-gray-600">${fmtN(p.total_sold)}</b></span>
          <span>Lãi: <b class="${(p.total_profit||0)>=0?'text-green-600':'text-red-500'}">${fmtK(p.total_profit)}</b></span>
        </div>
        <div class="mt-1.5 bg-gray-100 rounded-full h-1 overflow-hidden">
          <div class="bar h-1 ${barCol} rounded-full" style="width:${Math.min(margin,100)}%"></div>
        </div>
      </div>
      <div class="text-right shrink-0">
        <p class="text-sm font-bold text-gray-900">${fmtK(p.total_revenue)}</p>
        <p class="text-[11px] font-semibold ${margin>=20?'text-green-600':'text-orange-500'}">${margin.toFixed(1)}%</p>
      </div>
    </div>`;
  }).join(''):'<p class="px-4 py-6 text-sm text-gray-400 text-center">Chưa có dữ liệu sản phẩm</p>';

  const _r=getDateRange();
  const chartHtml=_r?buildChart(d.daily_data||[],prev?.daily_data||[],_r):'';

  const html=`
    <!-- KPI chính -->
    <div class="bg-white rounded-2xl border border-gray-100 p-4">
      <div class="flex items-start justify-between mb-3">
        <div>
          <p class="text-xs text-gray-400 font-medium uppercase tracking-wide">${periodLabel}</p>
          <p class="text-2xl font-bold text-gray-900 mt-0.5">${fmt(o.total_revenue)}${cmp(o.total_revenue,po?.total_revenue)}</p>
          <p class="text-xs text-gray-400 mt-1">Doanh thu · ${fmtN(o.total_orders)} đơn</p>
        </div>
        <div class="text-right">
          <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold ${isProfit?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}">
            ${isProfit?'▲':'▼'} ${Math.abs(o.profit_margin).toFixed(1)}%
          </span>
          <p class="text-xs text-gray-400 mt-1">Tỷ suất lãi</p>
        </div>
      </div>
      <div class="space-y-2">
        <div class="flex items-center gap-2.5">
          <span class="text-[11px] text-gray-400 w-14 shrink-0">Doanh thu</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden"><div class="bar h-2 bg-indigo-500 rounded-full" style="width:${revW}%"></div></div>
          <span class="text-[11px] font-semibold text-gray-700 text-right shrink-0">${fmt(o.total_revenue)}</span>
        </div>
        <div class="flex items-center gap-2.5">
          <span class="text-[11px] text-gray-400 w-14 shrink-0">Chi phí</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden"><div class="bar h-2 bg-rose-400 rounded-full" style="width:${costW}%"></div></div>
          <span class="text-[11px] font-semibold text-gray-700 text-right shrink-0">${fmt(o.total_cost)}</span>
        </div>
      </div>
    </div>

    <!-- 4 KPI cards nhỏ -->
    <div class="grid grid-cols-2 gap-3">
      <div class="${isProfit?'bg-green-50 border-green-100':'bg-red-50 border-red-100'} rounded-2xl p-3.5 border">
        <p class="text-[10px] ${isProfit?'text-green-500':'text-red-400'} font-medium uppercase tracking-wide">Lợi nhuận</p>
        <p class="text-base font-bold ${isProfit?'text-green-600':'text-red-500'} mt-1">${fmt(o.total_profit)}${cmp(o.total_profit,po?.total_profit)}</p>
        <p class="text-[11px] text-gray-400 mt-0.5">TB: ${fmt(o.avg_profit_per_order)}/đơn</p>
      </div>
      <div class="bg-white rounded-2xl p-3.5 border border-gray-100">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wide">Đơn hàng</p>
        <p class="text-lg font-bold text-gray-900 mt-1">${fmtN(o.total_orders)}${cmp(o.total_orders,po?.total_orders)}</p>
        <p class="text-[11px] text-gray-400 mt-0.5">TB: ${fmt(o.avg_revenue_per_order)}/đơn</p>
      </div>
      <div class="bg-white rounded-2xl p-3.5 border border-gray-100">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wide">SP đã bán</p>
        <p class="text-lg font-bold text-gray-900 mt-1">${fmtN(o.total_products_sold)}${cmp(o.total_products_sold,po?.total_products_sold)}</p>
      </div>
      <div class="bg-white rounded-2xl p-3.5 border border-gray-100">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wide">Khách hàng</p>
        <p class="text-lg font-bold text-gray-900 mt-1">${fmtN(o.unique_customers)}${cmp(o.unique_customers,po?.unique_customers)}</p>
        <p class="text-[11px] text-gray-400 mt-0.5">${o.unique_customers>0?(o.total_orders/o.unique_customers).toFixed(1):0} đơn/KH</p>
      </div>
    </div>

    <!-- Biểu đồ -->
    ${chartHtml}

    <!-- Hoa hồng -->
    <div class="bg-amber-50 rounded-2xl p-3.5 border border-amber-100 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-amber-200 flex items-center justify-center shrink-0">
          <svg class="w-4 h-4 text-amber-700" fill="currentColor" viewBox="0 0 20 20"><path d="M8 5a1 1 0 100 2h5.586l-1.293 1.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L13.586 5H8zM12 15a1 1 0 100-2H6.414l1.293-1.293a1 1 0 10-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L6.414 15H12z"/></svg>
        </div>
        <div>
          <p class="text-xs font-medium text-amber-800">Hoa hồng CTV</p>
          <p class="text-[11px] text-amber-600">${o.total_revenue>0?((o.commission||0)/o.total_revenue*100).toFixed(1):'0'}% doanh thu</p>
        </div>
      </div>
      <p class="text-base font-bold text-amber-700">${fmt(o.commission)}${cmp(o.commission||0,po?.commission||0)}</p>
    </div>

    <!-- Chi phí chi tiết -->
    ${costRows.length?`
    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <div class="px-4 pt-3.5 pb-2 flex items-center justify-between">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide">Chi phí chi tiết</h3>
        <span class="text-xs font-bold text-gray-900">${fmt(o.total_cost)}</span>
      </div>
      ${costRows.map(r=>{
        const barW=o.total_cost>0?Math.round(r.val/o.total_cost*100):0;
        return`<div class="px-4 py-2.5 border-t border-gray-50">
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm text-gray-600">${r.icon} ${r.label}</span>
            <div class="flex items-center gap-2">
              <span class="text-[11px] text-gray-400">${barW}%</span>
              <span class="text-sm font-semibold text-gray-700">${fmtK(r.val)}</span>
            </div>
          </div>
          <div class="bg-gray-100 rounded-full h-1 overflow-hidden"><div class="bar h-1 bg-rose-300 rounded-full" style="width:${barW}%"></div></div>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- Sản phẩm bán chạy -->
    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <div class="px-4 pt-3.5 pb-2">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide">Sản phẩm bán chạy</h3>
      </div>
      ${topProdHtml}
    </div>

    <!-- Danh sách đơn hàng gần đây (nếu có) -->
    ${d.orders&&d.orders.length?`
    <div>
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3 px-0.5">Đơn hàng · ${d.orders.length} đơn</h3>
      <div id="orderList" class="space-y-2"></div>
      <div id="loadMoreWrap" class="mt-3"></div>
    </div>`:''}
  `;

  const cEl=document.getElementById('content');
  const skEl=document.getElementById('skeleton');
  if(cEl)cEl.innerHTML=html;
  if(skEl)skEl.classList.add('hidden');
  if(cEl)cEl.classList.remove('hidden');

  // Render chart SVG
  if(_cMeta)renderChartSvg(_chartMode);

  // Animate bars
  requestAnimationFrame(()=>{
    document.querySelectorAll('.bar').forEach(b=>{
      const w=b.style.width;b.style.width='0%';
      requestAnimationFrame(()=>{b.style.width=w;});
    });
  });

  // Order list pagination (only if orders exist in response)
  if(d.orders&&d.orders.length){
    currentOrders=d.orders;
    orderPage=1;
    renderOrderList();
  }
}

function renderOrderList(){
  const list=document.getElementById('orderList');
  const wrap=document.getElementById('loadMoreWrap');
  if(!list||!wrap)return;
  const slice=currentOrders.slice(0,orderPage*ORDER_PAGE_SIZE);
  const remaining=currentOrders.length-slice.length;

  list.innerHTML=slice.map(o=>{
    const pc=(o.profit||0)>=0;
    const d=new Date(o.created_at_unix);
    const ds=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    return`<div class="bg-white rounded-xl px-4 py-3 border border-gray-100 flex items-center gap-3">
      <div class="min-w-0 flex-1">
        <p class="text-sm font-semibold text-gray-900 truncate">${o.customer_name||'—'}</p>
        <p class="text-xs text-gray-400 mt-0.5">${ds} · ${o.order_id||''}</p>
      </div>
      <div class="text-right shrink-0">
        <p class="text-sm font-bold text-gray-900">${fmtK(o.total_amount)}</p>
        <p class="text-xs font-semibold ${pc?'text-green-500':'text-red-400'} mt-0.5">${pc?'+':''}${fmtK(o.profit)}</p>
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML=remaining>0
    ?`<button onclick="loadMoreOrders()" class="w-full py-3 rounded-xl bg-white border border-gray-200 text-sm font-semibold text-indigo-600 hover:bg-indigo-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        Xem thêm ${remaining} đơn
      </button>`
    :(currentOrders.length>ORDER_PAGE_SIZE
      ?`<p class="text-xs text-center text-gray-400 py-2">Đã hiển thị tất cả ${currentOrders.length} đơn</p>`
      :'');
}

function loadMoreOrders(){
  orderPage++;
  renderOrderList();
  const items=document.getElementById('orderList').children;
  const firstNew=items[(orderPage-1)*ORDER_PAGE_SIZE];
  if(firstNew)firstNew.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ─── Chart: So sánh kỳ này vs kỳ trước (tab Doanh thu / Lợi nhuận) ───
function buildChart(curData,prevData,range){
  if(!curData||!curData.length){_cMeta=null;return'';}
  const isH=curData[0].hour!==undefined;
  const pts=[];
  if(isH){
    const pm={};(prevData||[]).forEach(d=>{pm[d.hour]=d;});
    curData.forEach(d=>{
      const p=pm[d.hour];
      pts.push({l:d.hour+'h',rev:d.revenue||0,prof:d.profit||0,ord:d.orders||0,prevRev:p?p.revenue||0:0,prevProf:p?p.profit||0:0,prevOrd:p?p.orders||0:0});
    });
  }else{
    const cMap={},pMap={};
    curData.forEach(d=>{cMap[d.date]=d;});
    (prevData||[]).forEach(d=>{pMap[d.date]=d;});
    const sMs=new Date(range.s+'T12:00:00+07:00').getTime();
    const eMs=new Date(range.e+'T12:00:00+07:00').getTime();
    const prevR=calcPrevRange(range.s,range.e);
    const psMs=new Date(prevR.s+'T12:00:00+07:00').getTime();
    let pi=0;
    for(let t=sMs;t<=eMs+1;t+=864e5){
      const k=new Date(t).toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});
      const dd=new Date(k+'T00:00:00+07:00');
      const c=cMap[k];
      const pk=new Date(psMs+pi*864e5).toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});
      const p=pMap[pk];
      pts.push({l:`${dd.getDate()}/${dd.getMonth()+1}`,rev:c?c.revenue:0,prof:c?c.profit:0,ord:c?c.orders||0:0,prevRev:p?p.revenue:0,prevProf:p?p.profit:0,prevOrd:p?p.orders||0:0});
      pi++;
    }
  }
  if(!pts.length){_cMeta=null;return'';}
  const hasPrev=pts.some(p=>p.prevRev>0||p.prevProf!==0);
  const W=350,H=180,pl=45,pr=10,ptt=15,pb=28;
  const cW=W-pl-pr,cH=H-ptt-pb;
  const xP=i=>pl+(pts.length>1?i/(pts.length-1)*cW:cW/2);
  let xl='';
  const mxL=isH?8:Math.min(pts.length,7);
  const stp=Math.max(1,Math.ceil(pts.length/mxL));
  for(let i=0;i<pts.length;i+=stp)
    xl+=`<text x="${xP(i).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#9ca3af" style="font-size:9px">${pts[i].l}</text>`;
  if(pts.length>1&&(pts.length-1)%stp!==0)
    xl+=`<text x="${xP(pts.length-1).toFixed(1)}" y="${H-6}" text-anchor="end" fill="#9ca3af" style="font-size:9px">${pts[pts.length-1].l}</text>`;
  _cMeta={pts,hasPrev,W,H,pl,pr,ptt,pb,cW,cH,xl};
  _chartMode='rev';
  return`<div class="bg-white rounded-2xl border border-gray-100 p-4" id="chartBox">
  <div class="flex bg-gray-100 rounded-lg p-0.5 gap-0.5 mb-3">
    <button onclick="switchChart('rev')" data-ct="rev" class="ct-tab flex-1 py-1.5 rounded-md text-xs font-medium text-gray-500 transition-all active">Doanh thu</button>
    <button onclick="switchChart('prof')" data-ct="prof" class="ct-tab flex-1 py-1.5 rounded-md text-xs font-medium text-gray-500 transition-all">Lợi nhuận</button>
    <button onclick="switchChart('ord')" data-ct="ord" class="ct-tab flex-1 py-1.5 rounded-md text-xs font-medium text-gray-500 transition-all">Đơn hàng</button>
  </div>
  <div class="flex items-center justify-end gap-3 text-[10px] mb-2">
    <span class="flex items-center gap-1"><span class="w-2.5 h-0.5 rounded inline-block" id="legCur" style="background:#6366f1"></span>Kỳ này</span>
    ${hasPrev?'<span class="flex items-center gap-1"><span class="w-2.5 h-0.5 bg-gray-300 rounded inline-block" style="border-top:1px dashed #9ca3af"></span>Kỳ trước</span>':''}
  </div>
  <div class="relative" id="chartWrap">
    <div id="chartInner"></div>
    <div id="cTip" class="hidden absolute top-0 left-0 -translate-x-1/2 bg-gray-900 text-white text-[10px] rounded-lg px-2.5 py-1.5 shadow-lg pointer-events-none whitespace-nowrap leading-relaxed" style="transition:all .15s"></div>
  </div>
  ${!hasPrev?'<p class="text-[10px] text-gray-400 text-center mt-2">Không có dữ liệu kỳ trước để so sánh</p>':''}
</div>`;
}

function renderChartSvg(mode){
  if(!_cMeta)return;
  const{pts,hasPrev,W,H,pl,pr,ptt,pb,cW,cH,xl}=_cMeta;
  const isOrd=mode==='ord';const isRev=mode==='rev';
  const color=isOrd?'#f59e0b':isRev?'#6366f1':'#10b981';
  const vals=pts.map(p=>isOrd?p.ord:isRev?p.rev:p.prof);
  const prev=pts.map(p=>isOrd?p.prevOrd:isRev?p.prevRev:p.prevProf);
  const all=vals.concat(hasPrev?prev:[]);
  const minV=Math.min(0,...all);
  const maxV=Math.max(0,...all);
  const rng=maxV-minV||1;
  const xP=i=>pl+(pts.length>1?i/(pts.length-1)*cW:cW/2);
  const yP=v=>ptt+cH-(v-minV)/rng*cH;
  _cMeta._mode=mode;_cMeta._minV=minV;_cMeta._rng=rng;
  const cPath=vals.map((v,i)=>`${i?'L':'M'}${xP(i).toFixed(1)},${yP(v).toFixed(1)}`).join('');
  const zy=yP(0);
  const cArea=cPath+` L${xP(vals.length-1).toFixed(1)},${zy.toFixed(1)} L${xP(0).toFixed(1)},${zy.toFixed(1)} Z`;
  let pPath='';
  if(hasPrev)pPath=prev.map((v,i)=>`${i?'L':'M'}${xP(i).toFixed(1)},${yP(v).toFixed(1)}`).join('');
  let g='',yl='';
  for(let i=0;i<=4;i++){
    const v=minV+rng*i/4,yy=yP(v);
    g+=`<line x1="${pl}" y1="${yy.toFixed(1)}" x2="${W-pr}" y2="${yy.toFixed(1)}" stroke="#f3f4f6"/>`;
    yl+=`<text x="${pl-4}" y="${(yy+3).toFixed(1)}" text-anchor="end" fill="#9ca3af" style="font-size:9px">${isOrd?Math.round(v):fmtK(v)}</text>`;
  }
  let zLine='';
  if(minV<0)zLine=`<line x1="${pl}" y1="${zy.toFixed(1)}" x2="${W-pr}" y2="${zy.toFixed(1)}" stroke="#e5e7eb" stroke-dasharray="4 2"/>`;
  const dots=pts.length<=10?vals.map((v,i)=>`<circle cx="${xP(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="3" fill="${color}" stroke="#fff" stroke-width="1.5"/>`).join(''):'';
  const el=document.getElementById('chartInner');
  if(!el)return;
  el.innerHTML=`<svg id="chartSvg" viewBox="0 0 ${W} ${H}" class="w-full" preserveAspectRatio="xMidYMid meet" onclick="chartTap(event)">
    ${g}${yl}${xl}${zLine}
    <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".12"/><stop offset="100%" stop-color="${color}" stop-opacity=".01"/></linearGradient></defs>
    ${hasPrev?`<path d="${pPath}" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 4"/>`:''}
    <path d="${cArea}" fill="url(#rg)"/>
    <path d="${cPath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <line id="cInd" x1="0" y1="${ptt}" x2="0" y2="${ptt+cH}" stroke="${color}" stroke-width="1" stroke-dasharray="3 2" style="opacity:0;transition:opacity .15s"/>
    <circle id="cDotC" r="4.5" fill="${color}" stroke="#fff" stroke-width="2" style="opacity:0;transition:opacity .15s"/>
    ${hasPrev?'<circle id="cDotP" r="3.5" fill="#d1d5db" stroke="#fff" stroke-width="1.5" style="opacity:0;transition:opacity .15s"/>':''}
  </svg>`;
  const leg=document.getElementById('legCur');if(leg)leg.style.background=color;
}

function switchChart(mode){
  _chartMode=mode;
  document.querySelectorAll('.ct-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.ct===mode);
    t.classList.toggle('text-gray-500',t.dataset.ct!==mode);
  });
  const tip=document.getElementById('cTip');if(tip)tip.classList.add('hidden');
  renderChartSvg(mode);
}

function chartTap(evt){
  if(!_cMeta)return;
  const{pts,hasPrev,W,ptt,cW,cH,pl,_mode,_minV,_rng}=_cMeta;
  const svg=document.getElementById('chartSvg');
  if(!svg)return;
  const rect=svg.getBoundingClientRect();
  const cx=(evt.clientX-rect.left)/rect.width*W;
  const xP=i=>pl+(pts.length>1?i/(pts.length-1)*cW:cW/2);
  const yP=v=>ptt+cH-(v-_minV)/_rng*cH;
  let best=0,bd=1e9;
  pts.forEach((_,i)=>{const d=Math.abs(xP(i)-cx);if(d<bd){bd=d;best=i;}});
  const tip=document.getElementById('cTip');
  const ind=document.getElementById('cInd');
  const dc=document.getElementById('cDotC');
  const dp=document.getElementById('cDotP');
  if(tip&&!tip.classList.contains('hidden')&&tip.dataset.i==best){
    tip.classList.add('hidden');if(ind)ind.style.opacity='0';
    if(dc)dc.style.opacity='0';if(dp)dp.style.opacity='0';return;
  }
  const p=pts[best];
  const isOrd=_mode==='ord';const isRev=_mode==='rev';
  const curV=isOrd?p.ord:isRev?p.rev:p.prof;
  const prevV=isOrd?p.prevOrd:isRev?p.prevRev:p.prevProf;
  const px=xP(best);
  if(ind){ind.setAttribute('x1',px);ind.setAttribute('x2',px);ind.style.opacity='1';}
  if(dc){dc.setAttribute('cx',px);dc.setAttribute('cy',yP(curV));dc.style.opacity='1';}
  if(dp&&hasPrev){dp.setAttribute('cx',px);dp.setAttribute('cy',yP(prevV));dp.style.opacity='1';}
  if(tip){
    let diff='';
    if(hasPrev&&prevV>0){
      const pct=(curV-prevV)/Math.abs(prevV)*100;const up=pct>=0;
      diff=` <span style="color:${up?'#86efac':'#fca5a5'}">${up?'↑':'↓'}${Math.abs(pct).toFixed(1)}%</span>`;
    }else if(hasPrev&&prevV===0&&curV>0){
      diff=' <span style="color:#86efac">↑ mới</span>';
    }
    const lbl=isOrd?'ĐH':isRev?'DT':'LN';
    const fv=v=>isOrd?v+' đơn':fmtK(v);
    const cc=isOrd?'#fcd34d':isRev?'#a5b4fc':'#6ee7b7';
    tip.innerHTML=`<b>${p.l}</b>${diff}<br><span style="color:${cc}">● ${lbl}: ${fv(curV)}</span>${hasPrev?`<br><span style="color:#d1d5db">○ ${lbl}: ${fv(prevV)}</span>`:''}`;
    tip.style.left=`${px/W*100}%`;
    tip.dataset.i=best;
    tip.classList.remove('hidden');
  }
}

// ─── Date Picker ───
function syncDateDisplay(dateInput,displayId){
  const v=dateInput.value;if(!v)return;
  const [y,m,d]=v.split('-');
  document.getElementById(displayId).textContent=`${d}/${m}/${y}`;
}

function openDatePicker(){
  const sheet=document.getElementById('dateSheet');
  sheet.classList.remove('hidden');
  document.body.style.overflow='hidden';
  // Init year select
  const ySel=document.getElementById('dpYear');
  if(!ySel.options.length){
    const cur=new Date().getFullYear();
    for(let y=cur;y>=cur-5;y--){
      const opt=document.createElement('option');opt.value=y;opt.textContent='Năm '+y;
      ySel.appendChild(opt);
    }
  }
  renderMonthGrid();
  // Init date inputs to today
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'});
  if(!document.getElementById('dpDay').value){document.getElementById('dpDay').value=today;syncDateDisplay(document.getElementById('dpDay'),'dpDayDisplay');}
  if(!document.getElementById('dpStart').value){document.getElementById('dpStart').value=today;syncDateDisplay(document.getElementById('dpStart'),'dpStartDisplay');}
  if(!document.getElementById('dpEnd').value){document.getElementById('dpEnd').value=today;syncDateDisplay(document.getElementById('dpEnd'),'dpEndDisplay');}
  setDateMode(dateMode);
}

function closeDateSheet(){
  document.getElementById('dateSheet').classList.add('hidden');
  document.body.style.overflow='';
}

function renderMonthGrid(){
  const y=parseInt(document.getElementById('dpYear').value);
  const grid=document.getElementById('monthGrid');
  const now=new Date();
  const curY=now.getFullYear(), curM=now.getMonth();
  grid.innerHTML='';
  for(let m=0;m<12;m++){
    const disabled=y===curY&&m>curM;
    const btn=document.createElement('button');
    btn.type='button';
    btn.className=`month-btn py-2 rounded-lg text-xs border border-gray-200 ${disabled?'opacity-30 cursor-not-allowed':'hover:border-indigo-300 hover:bg-indigo-50'}`;
    btn.textContent='Tháng '+(m+1);
    btn.dataset.m=m;
    if(!disabled)btn.onclick=()=>pickMonth(y,m);
    grid.appendChild(btn);
  }
}

function pickMonth(y,m){
  // Highlight selected
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.month-btn[data-m="${m}"]`)?.classList.add('active');
  // Set range
  const start=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const lastDay=new Date(y,m+1,0).getDate();
  const end=`${y}-${String(m+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  customRange={startDate:start,endDate:end};
  currentPeriod='custom';
  updateTabActive('custom');
  document.getElementById('customLabel').textContent=`T${m+1}/${y}`;
  closeDateSheet();
  loadData();
}

function setDateMode(mode){
  dateMode=mode;
  document.querySelectorAll('.dm-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.dm===mode);
    t.classList.toggle('text-gray-500',t.dataset.dm!==mode);
  });
  document.getElementById('dayPicker').classList.toggle('hidden',mode!=='day');
  document.getElementById('rangePicker').classList.toggle('hidden',mode!=='range');
}

function applyCustomDate(){
  if(dateMode==='day'){
    const day=document.getElementById('dpDay').value;
    if(!day)return;
    customRange={startDate:day,endDate:day};
    const d=new Date(day+'T00:00:00+07:00');
    document.getElementById('customLabel').textContent=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  }else{
    const s=document.getElementById('dpStart').value;
    const e=document.getElementById('dpEnd').value;
    if(!s||!e)return;
    if(s>e){document.getElementById('dpStart').classList.add('border-red-400');return;}
    customRange={startDate:s,endDate:e};
    const ds=new Date(s+'T00:00:00+07:00');
    const de=new Date(e+'T00:00:00+07:00');
    document.getElementById('customLabel').textContent=`${String(ds.getDate()).padStart(2,'0')}/${String(ds.getMonth()+1).padStart(2,'0')} - ${String(de.getDate()).padStart(2,'0')}/${String(de.getMonth()+1).padStart(2,'0')}`;
  }
  currentPeriod='custom';
  updateTabActive('custom');
  closeDateSheet();
  loadData();
}

function clearCustomDate(){
  customRange=null;
  document.getElementById('customLabel').textContent='Chọn ngày';
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  closeDateSheet();
  setPeriod('today');
}

function updateTabActive(p){
  document.querySelectorAll('.ptab').forEach(t=>{
    t.classList.toggle('active',t.dataset.p===p);
    t.classList.toggle('text-gray-500',t.dataset.p!==p);
  });
}

// Init
function _init(){
  const tab=document.querySelector('[data-p="today"]');
  if(tab){tab.classList.add('active');tab.classList.remove('text-gray-500');}
  loadData();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',_init);
else _init();
</script>
