<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Materials Pricing Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test Materials Pricing Update</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Product 35 - 7 hổ phách nâu đỏ</h2>
            <div id="productInfo" class="space-y-2">
                <p>Loading...</p>
            </div>
            <button onclick="loadProductInfo()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                Refresh Product Info
            </button>
        </div>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Material Costs</h2>
            <div id="materialInfo" class="space-y-2">
                <p>Loading...</p>
            </div>
            <button onclick="loadMaterialInfo()" class="mt-4 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                Refresh Material Info
            </button>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Test Recalculation</h2>
            <button onclick="testRecalculation()" class="px-4 py-2 bg-orange-600 text-white rounded hover:bg-orange-700">
                Test Recalculate All Prices
            </button>
            <div id="recalcResult" class="mt-4"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8787';

        async function loadProductInfo() {
            try {
                const response = await fetch(`${API_URL}?action=getProduct&id=35`);
                const data = await response.json();
                
                if (data.success) {
                    const product = data.product;
                    const profit = product.price - product.cost_price;
                    
                    document.getElementById('productInfo').innerHTML = `
                        <p><strong>Name:</strong> ${product.name}</p>
                        <p><strong>Price:</strong> ${formatCurrency(product.price)}</p>
                        <p><strong>Cost:</strong> ${formatCurrency(product.cost_price)}</p>
                        <p><strong>Actual Profit:</strong> ${formatCurrency(profit)}</p>
                        <p><strong>Pricing Method:</strong> ${product.pricing_method}</p>
                        <p><strong>Target Profit:</strong> ${product.target_profit ? formatCurrency(product.target_profit) : 'N/A'}</p>
                        <p><strong>Markup:</strong> ${product.markup_multiplier ? product.markup_multiplier.toFixed(2) : 'N/A'}</p>
                        <p class="${profit === product.target_profit ? 'text-green-600' : 'text-red-600'}">
                            <strong>Status:</strong> ${profit === product.target_profit ? '✅ Correct' : '❌ Incorrect'}
                        </p>
                    `;
                } else {
                    document.getElementById('productInfo').innerHTML = `<p class="text-red-600">Error: ${data.error}</p>`;
                }
            } catch (error) {
                document.getElementById('productInfo').innerHTML = `<p class="text-red-600">Error: ${error.message}</p>`;
            }
        }

        async function loadMaterialInfo() {
            try {
                // This would need to be implemented in the API
                document.getElementById('materialInfo').innerHTML = `
                    <p><strong>hat_dau_tam:</strong> 10 × 1,500đ = 15,000đ</p>
                    <p><strong>labor_cost:</strong> 1 × 8,000đ = 8,000đ</p>
                    <p><strong>ho_phach_nau:</strong> 7 × 3,500đ = 24,500đ</p>
                    <p><strong>day_do:</strong> 1 × 1,000đ = 1,000đ</p>
                    <p><strong>Total:</strong> 48,500đ</p>
                `;
            } catch (error) {
                document.getElementById('materialInfo').innerHTML = `<p class="text-red-600">Error: ${error.message}</p>`;
            }
        }

        async function testRecalculation() {
            try {
                document.getElementById('recalcResult').innerHTML = '<p class="text-blue-600">Testing recalculation...</p>';
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'recalculateAllPrices' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('recalcResult').innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded p-4">
                            <p class="text-green-800"><strong>Success!</strong></p>
                            <p>Updated: ${data.updated} products</p>
                            <p>Skipped: ${data.skipped} products</p>
                            <p>Total: ${data.total} products</p>
                        </div>
                    `;
                    
                    // Refresh product info
                    setTimeout(loadProductInfo, 1000);
                } else {
                    document.getElementById('recalcResult').innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded p-4">
                            <p class="text-red-800"><strong>Error:</strong> ${data.error}</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('recalcResult').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-4">
                        <p class="text-red-800"><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(amount).replace('₫', 'đ');
        }

        // Load initial data
        loadProductInfo();
        loadMaterialInfo();
    </script>
</body>
</html>
