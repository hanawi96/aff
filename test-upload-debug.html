<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Test Upload Debug</h1>
        
        <!-- Upload Form -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Chọn ảnh để test upload
            </label>
            <input type="file" id="testFile" accept="image/*" 
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>
        
        <!-- Upload Button -->
        <button onclick="testUpload()" 
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-medium">
            Test Upload
        </button>
        
        <!-- Results -->
        <div id="results" class="mt-6 p-4 bg-gray-50 rounded-lg hidden">
            <h3 class="font-semibold mb-2">Kết quả:</h3>
            <pre id="resultText" class="text-sm text-gray-700 whitespace-pre-wrap"></pre>
        </div>
        
        <!-- Image Preview -->
        <div id="imagePreview" class="mt-6 hidden">
            <h3 class="font-semibold mb-2">Preview:</h3>
            <img id="previewImg" class="max-w-full h-auto rounded-lg border" alt="Preview">
        </div>
    </div>

    <script>
        // Config
        const CONFIG = {
            API_URL: 'https://ctv-api.yendev96.workers.dev'
        };

        async function testUpload() {
            const fileInput = document.getElementById('testFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Vui lòng chọn file');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            const resultText = document.getElementById('resultText');
            
            resultsDiv.classList.remove('hidden');
            resultText.textContent = 'Đang upload...';
            
            try {
                console.log('📤 Starting upload test:', {
                    name: file.name,
                    size: file.size,
                    type: file.type
                });
                
                // Create form data
                const formData = new FormData();
                formData.append('image', file);
                formData.append('filename', file.name);
                
                // Upload
                const response = await fetch(`${CONFIG.API_URL}?action=uploadImage`, {
                    method: 'POST',
                    body: formData
                });
                
                console.log('📥 Response status:', response.status);
                console.log('📥 Response headers:', Object.fromEntries(response.headers.entries()));
                
                const data = await response.json();
                console.log('📥 Response data:', data);
                
                // Show results
                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    headers: Object.fromEntries(response.headers.entries()),
                    data: data
                };
                
                resultText.textContent = JSON.stringify(result, null, 2);
                
                // Show preview if successful
                if (data.success && data.url) {
                    const previewDiv = document.getElementById('imagePreview');
                    const previewImg = document.getElementById('previewImg');
                    
                    previewImg.src = data.url;
                    previewDiv.classList.remove('hidden');
                    
                    // Test CORS
                    try {
                        const corsTest = await fetch(data.url, { method: 'HEAD' });
                        console.log('🔍 CORS test:', corsTest.status, corsTest.statusText);
                    } catch (corsError) {
                        console.error('❌ CORS test failed:', corsError);
                    }
                }
                
            } catch (error) {
                console.error('❌ Upload error:', error);
                resultText.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
