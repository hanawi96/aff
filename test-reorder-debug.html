<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Reorder API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Debug Reorder API</h1>
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Test Data</h2>
            <pre id="testData" class="bg-gray-100 p-4 rounded text-sm overflow-x-auto"></pre>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Actions</h2>
            <div class="space-x-4">
                <button onclick="testReorderAPI()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                    Test Reorder API
                </button>
                <button onclick="getFeaturedProducts()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
                    Get Featured Products
                </button>
                <button onclick="clearLogs()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                    Clear Logs
                </button>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Logs</h2>
            <div id="logs" class="bg-gray-900 text-green-400 p-4 rounded text-sm h-96 overflow-y-auto font-mono"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8787';
        
        // Mock test data
        const testData = {
            product_orders: [
                { product_id: 1, display_order: 1 },
                { product_id: 2, display_order: 2 },
                { product_id: 3, display_order: 3 }
            ]
        };
        
        // Display test data
        document.getElementById('testData').textContent = JSON.stringify(testData, null, 2);
        
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const colors = {
                info: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400',
                success: 'text-blue-400'
            };
            
            const logEntry = document.createElement('div');
            logEntry.className = colors[type] || 'text-green-400';
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        async function testReorderAPI() {
            log('🧪 Starting reorder API test...', 'info');
            
            try {
                log('📤 Sending request to: ' + API_URL + '?action=reorderFeaturedProducts', 'info');
                log('📦 Request body: ' + JSON.stringify(testData, null, 2), 'info');
                
                const response = await fetch(`${API_URL}?action=reorderFeaturedProducts`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer test-token`
                    },
                    body: JSON.stringify(testData)
                });
                
                log('📊 Response status: ' + response.status, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log('📥 Response data: ' + JSON.stringify(data, null, 2), data.success ? 'success' : 'error');
                
                if (data.success) {
                    log('✅ API test successful!', 'success');
                } else {
                    log('❌ API test failed: ' + data.error, 'error');
                }
                
            } catch (error) {
                log('❌ Test error: ' + error.message, 'error');
                log('🔍 Error details: ' + error.stack, 'error');
            }
        }
        
        async function getFeaturedProducts() {
            log('📋 Getting featured products...', 'info');
            
            try {
                const response = await fetch(`${API_URL}?action=getFeaturedProductsForAdmin`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer test-token`
                    }
                });
                
                log('📊 Response status: ' + response.status, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                
                if (data.success) {
                    log('✅ Featured products count: ' + data.featured_products.length, 'success');
                    data.featured_products.forEach((product, index) => {
                        log(`  ${index + 1}. ${product.name} (ID: ${product.id}, Order: ${product.featured_order})`, 'info');
                    });
                } else {
                    log('❌ Failed to get featured products: ' + data.error, 'error');
                }
                
            } catch (error) {
                log('❌ Error getting featured products: ' + error.message, 'error');
            }
        }
        
        // Auto-load featured products on page load
        window.addEventListener('load', () => {
            log('🚀 Debug page loaded', 'success');
            getFeaturedProducts();
        });
    </script>
</body>
</html>
