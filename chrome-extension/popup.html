<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVD Order Helper</title>
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 20px;
      font-weight: 700;
    }
    p {
      margin: 0 0 12px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.95;
    }
    .status {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      backdrop-filter: blur(10px);
    }
    .status strong {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }
    a {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>📦 ShopVD Order Helper</h1>
  <p>Extension đang hoạt động!</p>
  
  <div class="status">
    <strong>Cách sử dụng:</strong>
    1. Vào trang <a href="https://pancake.vn" target="_blank">pancake.vn</a><br>
    2. Sidebar sẽ tự động xuất hiện bên phải<br>
    3. Bôi đen thông tin khách → Click "Lấy thông tin"<br>
    4. Hoặc nhập tay → Click "Tạo đơn hàng"
  </div>
</body>
</html>
